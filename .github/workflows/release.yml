name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item target/release/phoenix.exe release/
          Copy-Item README.md release/
          Copy-Item LICENSE release/
          Compress-Archive -Path release/* -DestinationPath phoenix-${{ steps.version.outputs.VERSION }}-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Phoenix ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            phoenix-${{ steps.version.outputs.VERSION }}-windows-x64.zip
            target/release/phoenix.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # System libraries required to build egui/eframe (winit/xcb), rfd file
      # dialogs (GTK), and reqwest's TLS backend.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Build release
        run: cargo build --release

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/release/phoenix release/
          cp README.md release/
          cp LICENSE release/
          tar -czf phoenix-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz -C release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Phoenix ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            phoenix-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
            target/release/phoenix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
